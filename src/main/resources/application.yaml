spring:
  application:
    name: campanas-service

  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://192.168.18.185:5432/campanas_db
    username: admin
    password: BJBQj381
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# JWT Configuration - SAME SECRET AS identity-org-service
jwt:
  secret: bWkgY2xhdmUgZXMgbXV5IHNlZ3VyZGEgQkpCUWozODE=
  issuer: identity-org-service

# Server Configuration
server:
  port: 8089
  servlet:
    context-path: /

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# OpenAPI/Swagger Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# Logging
logging:
  level:
    com.kubocode.campanas: DEBUG
    org.springframework.security: DEBUG
